<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFORTS — קידוד שאלון</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: #f5f7fa;
    color: #1a1a2e;
    padding: 16px;
    max-width: 800px;
    margin: 0 auto;
    direction: rtl;
  }
  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 4px;
    color: #2c3e50;
  }
  .subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #7f8c8d;
    margin-bottom: 20px;
  }
  /* Child info */
  .info-bar {
    background: #fff;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: end;
  }
  .info-bar label {
    font-size: 0.85rem;
    font-weight: 600;
    display: block;
    margin-bottom: 4px;
    color: #555;
  }
  .info-bar input, .info-bar select {
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 0.95rem;
    font-family: inherit;
  }
  .info-bar input:focus, .info-bar select:focus {
    outline: none;
    border-color: #3498db;
    box-shadow: 0 0 0 2px rgba(52,152,219,0.15);
  }
  .field { flex: 1; min-width: 140px; }

  /* Routine sections */
  .routine-section {
    background: #fff;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .routine-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 4px;
    padding-bottom: 8px;
    border-bottom: 2px solid #eee;
  }
  .routine-instruction {
    font-size: 0.82rem;
    color: #888;
    margin-bottom: 12px;
    margin-top: 4px;
  }

  /* Item row */
  .item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 8px;
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.15s;
  }
  .item-row:nth-child(even) { background: #f7f8fa; }
  .item-row:nth-child(odd) { background: #fff; }
  .item-row:hover { background: #eef4fb; }
  .item-row:last-child { border-bottom: none; }
  .item-num {
    font-weight: 700;
    color: #95a5a6;
    font-size: 0.85rem;
    min-width: 28px;
    text-align: center;
  }
  .item-text {
    flex: 1;
    font-size: 0.92rem;
    line-height: 1.5;
  }
  .item-scores {
    display: flex;
    gap: 3px;
    direction: rtl;
  }
  .item-scores input[type="radio"] { display: none; }
  .item-scores label {
    padding: 6px 6px;
    min-width: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    border: 2px solid #ddd;
    font-size: 0.68rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    color: #888;
    background: #fafafa;
    text-align: center;
    line-height: 1.2;
    white-space: nowrap;
  }
  .item-scores label:hover {
    border-color: #3498db;
    color: #3498db;
    background: #eaf4fd;
  }
  .item-scores input[type="radio"]:checked + label {
    background: #3498db;
    color: #fff;
    border-color: #3498db;
  }
  /* Scale headers */
  .scale-header-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 8px 8px 6px;
    border-bottom: 2px solid #e0e0e0;
    margin-bottom: 2px;
  }
  .sh-num { min-width: 28px; }
  .sh-text { flex: 1; }
  .sh-labels {
    display: flex;
    gap: 4px;
    direction: ltr;
  }
  .sh-label {
    width: 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .sh-label-text {
    font-size: 0.6rem;
    color: #888;
    text-align: center;
    line-height: 1.15;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    white-space: nowrap;
    height: 70px;
  }
  .sh-label-num {
    font-size: 0.75rem;
    font-weight: 700;
    color: #999;
  }

  /* Calculate button */
  .calc-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: #2ecc71;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 20px;
    transition: background 0.2s;
    font-family: inherit;
  }
  .calc-btn:hover { background: #27ae60; }
  .calc-btn:disabled {
    background: #bdc3c7;
    cursor: not-allowed;
  }

  /* Results */
  #results {
    display: none;
    background: #fff;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    margin-bottom: 20px;
  }
  .results-title {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 16px;
    color: #2c3e50;
    text-align: center;
  }
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .result-card {
    background: #f8f9fa;
    border-radius: 8px;
    padding: 14px;
    text-align: center;
    border: 2px solid transparent;
  }
  .result-card.below { border-color: #e74c3c; background: #fdf0ef; }
  .result-card.above { border-color: #2ecc71; background: #eafaf1; }
  .result-label {
    font-size: 0.8rem;
    color: #777;
    margin-bottom: 6px;
  }
  .result-score {
    font-size: 1.8rem;
    font-weight: 700;
  }
  .result-card.below .result-score { color: #e74c3c; }
  .result-card.above .result-score { color: #2ecc71; }
  .result-cutoff {
    font-size: 0.72rem;
    color: #aaa;
    margin-top: 4px;
  }
  .result-status {
    font-size: 0.78rem;
    font-weight: 600;
    margin-top: 4px;
  }
  .result-card.below .result-status { color: #e74c3c; }
  .result-card.above .result-status { color: #2ecc71; }

  .section-divider {
    grid-column: 1 / -1;
    text-align: center;
    font-weight: 700;
    font-size: 0.9rem;
    color: #555;
    padding: 8px 0 4px;
    border-top: 1px solid #eee;
  }
  .full-width { grid-column: 1 / -1; }

  /* Reset button */
  .reset-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: #e74c3c;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 20px;
  }
  .reset-btn:hover { background: #c0392b; }

  /* Missing items warning */
  .warning {
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 16px;
    font-size: 0.9rem;
    text-align: center;
    color: #856404;
    display: none;
  }

  /* Print styles */
  @media print {
    body { background: #fff; padding: 8px; font-size: 0.85rem; }
    .calc-btn, .reset-btn { display: none; }
    .routine-section { box-shadow: none; border: 1px solid #ddd; }
    #results { display: block !important; box-shadow: none; border: 1px solid #ddd; }
    .item-scores label {
      border: 1px solid #ccc;
      width: 28px; height: 28px; font-size: 0.75rem;
    }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .results-grid { grid-template-columns: 1fr; }
    .item-row { flex-wrap: wrap; }
    .item-scores { margin-top: 6px; width: 100%; justify-content: center; }
    .item-scores label { min-width: 50px; font-size: 0.7rem; padding: 8px 4px; }
  }
</style>
</head>
<body>

<h1>EFORTS — קידוד שאלון</h1>
<p class="subtitle">שאלון למדידת יכולת הניהול העצמי של ילדים בשגרות היום יום — Frisch & Rosenblum, 2014</p>

<!-- Child Info -->
<div class="info-bar">
  <div class="field">
    <label for="anonId">מספר מזהה</label>
    <input type="text" id="anonId" placeholder="מספר אנונימי">
  </div>
  <div class="field">
    <label for="childGender">מין</label>
    <select id="childGender">
      <option value="">—</option>
      <option value="male">זכר</option>
      <option value="female">נקבה</option>
    </select>
  </div>
  <div class="field">
    <label for="birthDate">תאריך לידה</label>
    <input type="date" id="birthDate">
  </div>
  <div class="field">
    <label>גיל</label>
    <div id="calcAge" style="padding:8px 10px; font-size:0.95rem; color:#555;">—</div>
  </div>
  <div class="field">
    <label>קבוצת גיל</label>
    <div id="ageGroupDisplay" style="padding:8px 10px; font-size:0.95rem; color:#555;">—</div>
    <input type="hidden" id="ageGroup">
  </div>
  <div class="field">
    <label for="fillDate">תאריך מילוי</label>
    <input type="date" id="fillDate">
  </div>
</div>

<div class="warning" id="warning"></div>

<!-- Questionnaire -->
<div id="questionnaire"></div>

<button class="calc-btn" id="calcBtn" onclick="calculate()">חשב ציונים</button>

<!-- Results -->
<div id="results"></div>

<button class="reset-btn" id="resetBtn" style="display:none" onclick="resetForm()">אפס שאלון</button>

  { num: 9, text: "מתחיל בביצוע פעילויות הערב ביוזמתו. לדוגמה, יוזם לבישת פיג׳מה", routine: "morning", ef: "wm" },
  { num: 10, text: "מצליח להתמיד בפעילויות הערב בקצב מתאים, ללא צורך בתזכורת של מבוגר", routine: "morning", ef: null },
  { num: 11, text: "זוכר את רצף הפעילויות שצריך לעשות בערב לפי סדרן", routine: "morning", ef: null },
  { num: 12, text: "מתארגן בערב בהתאם לכללי הבית. לדוגמה, מסייע בפינוי השולחן או מניח הבגדים שלבש במקום מתאים", routine: "morning", ef: "wm" },
  { num: 13, text: "פותר בעיות שמתעוררות במהלך ביצוע פעילויות הערב. לדוגמה, כשחסר לו סכו״ם בארוחה, כשמונחים חפצים על המיטה שלו או כשהפיג׳מה שלו בכביסה", routine: "morning", ef: "flex" },
  { num: 14, text: "מבצע רק פעילויות שמקדמות את ההכנה לשינה ונמנע מעיסוק בדברים אחרים שהוא רואה או שומע ושאינם קשורים לכך. לדוגמה, מצליח להתעלם מטלוויזיה שפועלת ברקע", routine: "morning", ef: "inh" },
  { num: 15, text: "מתייחס לאיכות הביצוע של פעילויות. לדוגמה, בודק שהפיג׳מה שהוא לובש אינה הפוכה", routine: "morning", ef: "flex" },
  { num: 16, text: "נוטה לסיים פעילויות מבלי להפסיקן באמצע ולעבור לפעילויות אחרות", routine: "morning", ef: "inh" },
  // Play & Leisure (17-23)
  { num: 17, text: "מתחיל לבצע את הפעילויות ביוזמתו. לדוגמה, בוחר משחק", routine: "play", ef: "flex" },
  { num: 18, text: "מצליח לשחק בקצב מתאים (לא מהיר או איטי מדי)", routine: "play", ef: "wm" },

  { num: 20, text: "משחק בהתאם לכללי המשחק. לדוגמה, מחכה לתורו", routine: "play", ef: "wm" },
  { num: 21, text: "בזמן שהוא משחק במשחק ספציפי הוא מבצע רק פעילויות שקשורות אליו ונמנע מלהסתובב בחדר או לגעת במשחקים אחרים", routine: "play", ef: "flex" },
  { num: 22, text: "עוצר לחשוב לפני שמשחק. לדוגמה, במשחק בנייה הוא מדמיין איך ייראה מה שרוצה להרכיב או בוחר מראש דגם מסוים, ובציור הוא מתכנן מראש מה ירצה לצייר ואז מתחיל לצייר", routine: "play", ef: "flex" },
  { num: 23, text: "מסיים משחק אחד לפני שהוא עובר למשחק אחר", routine: "play", ef: "inh" },
  // Social (24-30)
  { num: 24, text: "יוזם אינטראקציה חברתית. לדוגמה, מזמין חבר הביתה", routine: "social", ef: "flex" },
  { num: 25, text: "לומד מהתנסות חברתית שלילית. לדוגמה, כאשר עושה משהו מכעיס ומקבל תגובה שלילית, הוא יימנע מלחזור על המעשה", routine: "social", ef: "wm" },
  { num: 26, text: "נמנע מהבעה מוגזמת של כעס או תסכול בזמן משחק עם חברים", routine: "social", ef: "inh" },

  { num: 30, text: "חושב על התגובות שלו כאשר הוא מתייחס למעשי חבריו", routine: "social", ef: "inh" },

// Cutoff scores
const cutoffs = {
  "3-5": { morning: 2.45, play: 3.14, social: 2.71, total: 2.92, inh: 2.51, wm: 3.00, flex: 2.72 },
  "6-7": { morning: 2.74, play: 3.42, social: 2.85, total: 3.16, inh: 2.77, wm: 3.26, flex: 3.00 },
  "8-11": { morning: 2.76, play: 3.55, social: 3.04, total: 3.28, inh: 2.84, wm: 3.37, flex: 3.07 },
};

const routineNames = { morning: "בוקר וערב", play: "פנאי ומשחק", social: "שגרה חברתית" };
const efNames = { inh: "עכבה", wm: "זיכרון עבודה", flex: "גמישות מחשבתית" };

// ===== BUILD QUESTIONNAIRE =====
function buildForm() {
  const container = document.getElementById("questionnaire");
  const routines = [
    { key: "morning", title: "שגרות בוקר וערב", instruction: "בהקשר לשגרת הבוקר והערב, נא ציינ/י באיזו מידה ילדך:", range: [1,16] },
    { key: "play", title: "שגרות משחק ופנאי", instruction: "בזמנים של משחק עצמאי ופנאי, נא ציינ/י באיזו מידה ילדך:", range: [17,23] },
    { key: "social", title: "שגרה חברתית", instruction: "בהקשר לתפקוד החברתי, נא ציינ/י באיזו מידה ילדך:", range: [24,30] },
  ];

  const scaleLabels = ["אף פעם", "לעיתים רחוקות", "לפעמים", "לעיתים קרובות", "תמיד"];
  const shortLabels = ["אף פעם", "לעיתים\nרחוקות", "לפעמים", "לעיתים\nקרובות", "תמיד"];

  routines.forEach(r => {
    const section = document.createElement("div");
    section.className = "routine-section";

    let html = `<div class="routine-title">${r.title}</div>`;
    html += `<div style="display:flex; align-items:center; gap:8px; margin:8px 0 4px; font-size:0.85rem; color:#666;">
      <span>מי נמצא עם הילד בדרך כלל בשגרות אלו:</span>
      <select id="companion_${r.key}" style="padding:4px 8px; border:1px solid #ddd; border-radius:6px; font-family:inherit; font-size:0.85rem;">
        <option value="">—</option>
        <option value="mom">אמא</option>
        <option value="dad">אבא</option>
        <option value="both">שני ההורים</option>
        <option value="other">אחר</option>
      </select>
    </div>`;
    html += `<div class="routine-instruction">${r.instruction}</div>`;

    items.filter(it => it.num >= r.range[0] && it.num <= r.range[1]).forEach(item => {
      html += `<div class="item-row">
        <span class="item-num">${item.num}</span>
        <span class="item-text">${item.text}</span>
        <div class="item-scores">`;
      for (let v = 1; v <= 5; v++) {
        html += `<input type="radio" name="q${item.num}" id="q${item.num}_${v}" value="${v}">`;
        html += `<label for="q${item.num}_${v}">${scaleLabels[v-1]}</label>`;
      }
      html += `</div>
        <span class="item-num">${item.num}</span>`;
      html += `</div></div>`;
    });

    section.innerHTML = html;
    container.appendChild(section);
  });
}

// Auto-calculate age from date of birth
function updateAge() {
  const birthInput = document.getElementById("birthDate").value;
  const fillInput = document.getElementById("fillDate").value;
  if (!birthInput || !fillInput) return;

  const birth = new Date(birthInput);
  const fill = new Date(fillInput);
  if (birth >= fill) return;

  // Calculate years and months
  let years = fill.getFullYear() - birth.getFullYear();
  let months = fill.getMonth() - birth.getMonth();
  if (fill.getDate() < birth.getDate()) months--;
  if (months < 0) { years--; months += 12; }

  const totalYears = years + months / 12;
  document.getElementById("calcAge").textContent = `${years} שנים, ${months} חודשים`;

  // Set age group
  const ageGroupEl = document.getElementById("ageGroup");
  const ageGroupDisplay = document.getElementById("ageGroupDisplay");
  if (totalYears >= 3 && totalYears < 6) {
    ageGroupEl.value = "3-5";
    ageGroupDisplay.textContent = "3.0 — 5.11";
  } else if (totalYears >= 6 && totalYears < 8) {
    ageGroupEl.value = "6-7";
    ageGroupDisplay.textContent = "6.0 — 7.11";
  } else if (totalYears >= 8 && totalYears < 12) {
    ageGroupEl.value = "8-11";
    ageGroupDisplay.textContent = "8.0 — 11.11";
  } else {
    ageGroupEl.value = "";
    ageGroupDisplay.textContent = "מחוץ לטווח הגילאים";
    ageGroupDisplay.style.color = "#e74c3c";
    return;
  }
  ageGroupDisplay.style.color = "#2ecc71";
}

document.addEventListener("DOMContentLoaded", () => {
  buildForm();
  document.getElementById("fillDate").valueAsDate = new Date();
  document.getElementById("birthDate").addEventListener("change", updateAge);
  document.getElementById("fillDate").addEventListener("change", updateAge);
});

// ===== CALCULATE =====
function calculate() {
  const ageGroup = document.getElementById("ageGroup").value;
  if (!ageGroup) {
    showWarning("יש לבחור קבוצת גיל לפני חישוב הציונים");
    return;
  }

  // Collect scores
  const scores = {};
  let missing = [];
  items.forEach(item => {
    const checked = document.querySelector(`input[name="q${item.num}"]:checked`);
    if (checked) {
      scores[item.num] = parseInt(checked.value);
    } else {
      missing.push(item.num);
    }
  });

  if (missing.length > 0) {
    showWarning(`חסרות תשובות לפריטים: ${missing.join(", ")}`);
    return;
  }

  hideWarning();

  // Routine averages
  const morningItems = items.filter(i => i.routine === "morning").map(i => scores[i.num]);
  const playItems = items.filter(i => i.routine === "play").map(i => scores[i.num]);
  const socialItems = items.filter(i => i.routine === "social").map(i => scores[i.num]);

  const morningAvg = avg(morningItems);
  const playAvg = avg(playItems);
  const socialAvg = avg(socialItems);
  const totalAvg = avg([morningAvg, playAvg, socialAvg]);

  // EF scale averages (items 10 and 11 excluded)
  const inhItems = items.filter(i => i.ef === "inh").map(i => scores[i.num]);
  const wmItems = items.filter(i => i.ef === "wm").map(i => scores[i.num]);
  const flexItems = items.filter(i => i.ef === "flex").map(i => scores[i.num]);

  const inhAvg = avg(inhItems);
  const wmAvg = avg(wmItems);
  const flexAvg = avg(flexItems);

  // Get cutoffs
  const c = cutoffs[ageGroup];

  // Build results
  const resultsDiv = document.getElementById("results");
  const ageLabel = document.getElementById("ageGroupDisplay").textContent;
  const anonId = document.getElementById("anonId").value || "—";
  const ageText = document.getElementById("calcAge").textContent;
  const gender = document.getElementById("childGender").value === "male" ? "זכר" : document.getElementById("childGender").value === "female" ? "נקבה" : "";

  resultsDiv.innerHTML = `
    <div class="results-title">תוצאות — מזהה: ${anonId} | ${gender} | ${ageText} | קבוצת גיל: ${ageLabel}</div>
    <div class="results-grid">
      <div class="section-divider">ציוני שגרות</div>
      ${resultCard("בוקר וערב", morningAvg, c.morning)}
      ${resultCard("פנאי ומשחק", playAvg, c.play)}
      ${resultCard("שגרה חברתית", socialAvg, c.social)}
      ${resultCard("ציון כולל", totalAvg, c.total, true)}

      <div class="section-divider">סולמות תפקודים ניהוליים</div>
      ${resultCard("עכבה", inhAvg, c.inh)}
      ${resultCard("זיכרון עבודה", wmAvg, c.wm)}
      ${resultCard("גמישות מחשבתית", flexAvg, c.flex)}
    </div>
    <div style="font-size:0.75rem; color:#aaa; text-align:center; margin-top:8px;">
      ציון חתך = 1.5 סטיות תקן מתחת לממוצע הנורמטיבי. ציון מתחת לחתך מעיד על חשד לעיכוב.
      <br>פריטים 10 ו-11 לא נכללים בחישוב הסולמות הניהוליים.
    </div>
  `;

  resultsDiv.style.display = "block";
  document.getElementById("resetBtn").style.display = "block";
  resultsDiv.scrollIntoView({ behavior: "smooth", block: "start" });
}

function resultCard(label, score, cutoff, isTotal) {
  const status = score >= cutoff ? "above" : "below";
  const statusText = score >= cutoff ? "בטווח התקין" : "מתחת לציון החתך";
  return `<div class="result-card ${status} ${isTotal ? 'full-width' : ''}">
    <div class="result-label">${label}</div>
    <div class="result-score">${score.toFixed(2)}</div>
    <div class="result-cutoff">ציון חתך: ${cutoff.toFixed(2)}</div>
    <div class="result-status">${statusText}</div>
  </div>`;
}

function avg(arr) {
  if (arr.length === 0) return 0;
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}

function showWarning(msg) {
  const w = document.getElementById("warning");
  w.textContent = msg;
  w.style.display = "block";
  w.scrollIntoView({ behavior: "smooth" });
}
function hideWarning() {
  document.getElementById("warning").style.display = "none";
}

function resetForm() {
  if (!confirm("לאפס את כל התשובות?")) return;
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  document.getElementById("results").style.display = "none";
  document.getElementById("resetBtn").style.display = "none";
  window.scrollTo({ top: 0, behavior: "smooth" });
}
</script>
