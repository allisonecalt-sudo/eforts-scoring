<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFORTS — קידוד שאלון</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: #f5f7fa;
    color: #1a1a2e;
    padding: 16px;
    max-width: 800px;
    margin: 0 auto;
    direction: rtl;
  }
  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 4px;
    color: #2c3e50;
  }
  .subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #7f8c8d;
    margin-bottom: 20px;
  }
  /* Child info */
  .info-bar {
    background: #fff;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: end;
  }
  .info-bar label {
    font-size: 0.85rem;
    font-weight: 600;
    display: block;
    margin-bottom: 4px;
    color: #555;
  }
  .info-bar input, .info-bar select {
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 0.95rem;
    font-family: inherit;
  }
  .info-bar input:focus, .info-bar select:focus {
    outline: none;
    border-color: #3498db;
    box-shadow: 0 0 0 2px rgba(52,152,219,0.15);
  }
  .field { flex: 1; min-width: 140px; }

  /* Routine sections */
  .routine-section {
    background: #fff;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .routine-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 4px;
    padding-bottom: 8px;
    border-bottom: 2px solid #eee;
  }
  .routine-instruction {
    font-size: 0.82rem;
    color: #888;
    margin-bottom: 12px;
    margin-top: 4px;
  }

  /* Item row */
  .item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 8px;
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.15s;
  }
  .item-row:nth-child(even) { background: #f7f8fa; }
  .item-row:nth-child(odd) { background: #fff; }
  .item-row:hover { background: #eef4fb; }
  .item-row:last-child { border-bottom: none; }
  .item-num {
    font-weight: 700;
    color: #95a5a6;
    font-size: 0.85rem;
    min-width: 28px;
    text-align: center;
  }
  .item-text {
    flex: 1;
    font-size: 0.92rem;
    line-height: 1.5;
  }
  .item-scores {
    display: flex;
    gap: 3px;
    direction: rtl;
  }
  .item-scores input[type="radio"] { display: none; }
  .item-scores label {
    padding: 6px 4px;
    width: 58px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    border: 2px solid #ddd;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    color: #888;
    background: #fafafa;
    text-align: center;
    line-height: 1.15;
    white-space: pre-line;
  }
  .item-scores label:hover {
    border-color: #3498db;
    color: #3498db;
    background: #eaf4fd;
  }
  .item-scores input[type="radio"]:checked + label {
    background: #3498db;
    color: #fff;
    border-color: #3498db;
  }
  /* Scale headers */
  .scale-header-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 8px 8px 6px;
    border-bottom: 2px solid #e0e0e0;
    margin-bottom: 2px;
  }
  .sh-num { min-width: 28px; }
  .sh-text { flex: 1; }
  .sh-labels {
    display: flex;
    gap: 4px;
    direction: ltr;
  }
  .sh-label {
    width: 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .sh-label-text {
    font-size: 0.6rem;
    color: #888;
    text-align: center;
    line-height: 1.15;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    white-space: nowrap;
    height: 70px;
  }
  .sh-label-num {
    font-size: 0.75rem;
    font-weight: 700;
    color: #999;
  }

  /* Calculate button */
  .calc-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: #2ecc71;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 20px;
    transition: background 0.2s;
    font-family: inherit;
  }
  .calc-btn:hover { background: #27ae60; }
  .calc-btn:disabled {
    background: #bdc3c7;
    cursor: not-allowed;
  }

  /* Results */
  #results {
    display: none;
    background: #fff;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    margin-bottom: 20px;
  }
  .results-title {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 16px;
    color: #2c3e50;
    text-align: center;
  }
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .result-card {
    background: #f8f9fa;
    border-radius: 8px;
    padding: 14px;
    text-align: center;
    border: 2px solid transparent;
  }
  .result-card.below { border-color: #e74c3c; background: #fdf0ef; }
  .result-card.above { border-color: #2ecc71; background: #eafaf1; }
  .result-label {
    font-size: 0.8rem;
    color: #777;
    margin-bottom: 6px;
  }
  .result-score {
    font-size: 1.8rem;
    font-weight: 700;
  }
  .result-card.below .result-score { color: #e74c3c; }
  .result-card.above .result-score { color: #2ecc71; }
  .result-interp {
    font-size: 0.82rem;
    font-weight: 600;
    color: #555;
    margin-top: 2px;
  }
  .result-card.below .result-interp { color: #c0392b; }
  .result-card.above .result-interp { color: #27ae60; }
  .result-cutoff {
    font-size: 0.72rem;
    color: #aaa;
    margin-top: 4px;
    cursor: help;
  }
  .result-score { cursor: help; }
  .result-status {
    font-size: 0.78rem;
    font-weight: 600;
    margin-top: 4px;
  }
  .result-card.below .result-status { color: #e74c3c; }
  .result-card.above .result-status { color: #2ecc71; }

  /* Drilldown */
  .result-card.clickable { cursor: pointer; }
  .result-card.clickable:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .drill-arrow {
    font-size: 0.7rem;
    color: #aaa;
    margin-right: 4px;
    transition: transform 0.2s;
  }
  .drilldown {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #e0e0e0;
    text-align: right;
  }
  .drill-summary {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .drill-badge {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .drill-badge.drill-weak { background: #fde8e8; color: #c0392b; }
  .drill-badge.drill-mid { background: #fef9e7; color: #d4a017; }
  .drill-badge.drill-strong { background: #e8f8f0; color: #27ae60; }

  .drill-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 6px;
    border-radius: 6px;
    margin-bottom: 3px;
    font-size: 0.82rem;
  }
  .drill-weak-row { background: #fdf0ef; }
  .drill-mid-row { background: #fefbf0; }
  .drill-strong-row { background: #f0faf5; }
  .drill-item-num {
    font-weight: 700;
    color: #999;
    min-width: 24px;
    text-align: center;
    font-size: 0.78rem;
  }
  .drill-item-text {
    flex: 1;
    line-height: 1.4;
  }
  .drill-item-tag {
    font-size: 0.68rem;
    padding: 2px 6px;
    border-radius: 4px;
    background: #eee;
    color: #666;
    white-space: nowrap;
  }
  .drill-dots {
    display: flex;
    gap: 3px;
    direction: ltr;
  }
  .drill-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 600;
    color: #ccc;
    background: #f5f5f5;
    border: 1px solid #e0e0e0;
  }
  .drill-weak-bg { background: #e74c3c !important; color: #fff !important; border-color: #e74c3c !important; }
  .drill-mid-bg { background: #f39c12 !important; color: #fff !important; border-color: #f39c12 !important; }
  .drill-strong-bg { background: #2ecc71 !important; color: #fff !important; border-color: #2ecc71 !important; }

  /* Summary */
  .summary-section {
    margin-top: 20px;
    padding: 16px;
    background: #f8f9ff;
    border: 1px solid #d0d5e8;
    border-radius: 8px;
  }
  .summary-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 10px;
    text-align: center;
  }
  .summary-text {
    font-size: 0.88rem;
    line-height: 1.7;
    color: #333;
  }
  .summary-text ul {
    padding-right: 20px;
    margin: 6px 0;
  }
  .summary-text li { margin-bottom: 4px; }
  .pdf-btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin-top: 16px;
    background: #8e44ad;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .pdf-btn:hover { background: #7d3c98; }
  .pdf-btn:disabled { background: #bbb; cursor: wait; }
  .drill-hint {
    font-size: 0.75rem;
    color: #888;
    text-align: center;
    margin-top: 8px;
    margin-bottom: 4px;
  }

  .back-btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    background: #3498db;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .back-btn:hover { background: #2980b9; }

  /* Custom tooltips */
  .has-tooltip {
    position: relative;
    cursor: help;
  }
  .has-tooltip .tooltip-text {
    visibility: hidden;
    opacity: 0;
    position: absolute;
    z-index: 100;
    background: #333;
    color: #fff;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.78rem;
    line-height: 1.6;
    width: 240px;
    text-align: right;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: pre-line;
  }
  .has-tooltip:hover .tooltip-text,
  .has-tooltip:focus .tooltip-text {
    visibility: visible;
    opacity: 1;
  }

  .section-divider {
    grid-column: 1 / -1;
    text-align: center;
    font-weight: 700;
    font-size: 0.9rem;
    color: #555;
    padding: 8px 0 4px;
    border-top: 1px solid #eee;
  }
  .full-width { grid-column: 1 / -1; }

  /* Reset button */
  .reset-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: #e74c3c;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 20px;
  }
  .reset-btn:hover { background: #c0392b; }
  .save-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: #3498db;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 8px;
  }
  .save-btn:hover { background: #2980b9; }
  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .btn-row button { flex: 1; }
  .save-indicator {
    text-align: center;
    font-size: 0.8rem;
    color: #27ae60;
    margin-bottom: 12px;
    display: none;
  }

  /* Missing items warning */
  .warning {
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 16px;
    font-size: 0.9rem;
    text-align: center;
    color: #856404;
    display: none;
  }

  /* Print styles */
  @media print {
    body { background: #fff; padding: 8px; font-size: 0.85rem; }
    .calc-btn, .reset-btn { display: none; }
    .routine-section { box-shadow: none; border: 1px solid #ddd; }
    #results { display: block !important; box-shadow: none; border: 1px solid #ddd; }
    .item-scores label {
      border: 1px solid #ccc;
      width: 28px; height: 28px; font-size: 0.75rem;
    }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .results-grid { grid-template-columns: 1fr; }
    .item-row { flex-wrap: wrap; }
    .item-scores { margin-top: 6px; width: 100%; justify-content: center; }
    .item-scores label { min-width: 50px; font-size: 0.7rem; padding: 8px 4px; }
  }
</style>
</head>
<body>

<h1>EFORTS — קידוד שאלון</h1>
<p class="subtitle">שאלון למדידת יכולת הניהול העצמי של ילדים בשגרות היום יום — Frisch & Rosenblum, 2014</p>

<!-- Child Info -->
<div class="info-bar">
  <div class="field">
    <label for="anonId">מספר מזהה</label>
    <input type="text" id="anonId" placeholder="מספר אנונימי">
  </div>
  <div class="field">
    <label for="childGender">מין</label>
    <select id="childGender">
      <option value="">—</option>
      <option value="male">זכר</option>
      <option value="female">נקבה</option>
    </select>
  </div>
  <div class="field">
    <label for="birthDate">תאריך לידה</label>
    <input type="date" id="birthDate">
  </div>
  <div class="field">
    <label>גיל</label>
    <div id="calcAge" style="padding:8px 10px; font-size:0.95rem; color:#555;">—</div>
  </div>
  <div class="field">
    <label>קבוצת גיל</label>
    <div id="ageGroupDisplay" style="padding:8px 10px; font-size:0.95rem; color:#555;">—</div>
    <input type="hidden" id="ageGroup">
  </div>
  <div class="field">
    <label for="fillDate">תאריך מילוי</label>
    <input type="date" id="fillDate">
  </div>
</div>

<div class="warning" id="warning"></div>

<!-- Questionnaire -->
<div id="questionnaire"></div>

<div class="btn-row">
  <button class="calc-btn" onclick="calculate()">חשב ציונים</button>
  <button class="save-btn" onclick="saveForm()">שמור</button>
</div>
<div class="save-indicator" id="saveIndicator">נשמר בהצלחה</div>

<!-- Results -->
<div id="results"></div>

<div class="btn-row" id="resetRow" style="display:none">
  <button class="reset-btn" onclick="resetForm()">אפס שאלון חדש</button>
</div>

<script>
// ===== DATA =====
const items = [
  // Morning & Evening (1-16)
  { num: 1, text: "מתחיל ביוזמתו לבצע פעילויות בבוקר כמו התלבשות או צחצוח שיניים", routine: "morning", ef: "wm" },
  { num: 2, text: "מצליח להתמיד בפעילות הבוקר בקצב מתאים, ללא צורך בתזכורת של מבוגר", routine: "morning", ef: "wm" },
  { num: 3, text: "זוכר את רצף הפעילויות שצריך לעשות בבוקר לפי סדרן", routine: "morning", ef: "wm" },
  { num: 4, text: "מתארגן בבוקר בהתאם לכללי הבית. לדוגמה, שוטף ידיים אחר השירותים, מניח את הפיג׳מה על מיטתו או מסיר צלחת מהשולחן", routine: "morning", ef: "wm" },
  { num: 5, text: "פותר בעיות שמתעוררות במהלך ביצוע פעילויות הבוקר. לדוגמה, מחפש בעצמו חפצים חיוניים כשהוא לא מוצא אותם", routine: "morning", ef: "flex" },
  { num: 6, text: "מבצע רק פעילויות שמקדמות את ההתלבשות וההכנה ליציאה מהבית ונמנע מעיסוק בדברים אחרים שרואה או שומע ושאינם קשורים לכך. לדוגמה, מצליח להתעלם מטלוויזיה שדלוקה בחדר אחר", routine: "morning", ef: "inh" },
  { num: 7, text: "מקפיד על איכות הביצוע של הפעילויות. לדוגמה, בודק שהוא לקח את הכריך שלו ולא של מישהו אחר מבני הבית או שהבגדים שהוא לובש אינם הפוכים", routine: "morning", ef: "wm" },
  { num: 8, text: "נוטה לסיים פעילויות מבלי להפסיקן באמצע ולעבור לפעילויות אחרות", routine: "morning", ef: "inh" },
  { num: 9, text: "מתחיל בביצוע פעילויות הערב ביוזמתו. לדוגמה, יוזם לבישת פיג׳מה", routine: "morning", ef: "wm" },
  { num: 10, text: "מצליח להתמיד בפעילויות הערב בקצב מתאים, ללא צורך בתזכורת של מבוגר", routine: "morning", ef: null },
  { num: 11, text: "זוכר את רצף הפעילויות שצריך לעשות בערב לפי סדרן", routine: "morning", ef: null },
  { num: 12, text: "מתארגן בערב בהתאם לכללי הבית. לדוגמה, מסייע בפינוי השולחן או מניח הבגדים שלבש במקום מתאים", routine: "morning", ef: "wm" },
  { num: 13, text: "פותר בעיות שמתעוררות במהלך ביצוע פעילויות הערב. לדוגמה, כשחסר לו סכו״ם בארוחה, כשמונחים חפצים על המיטה שלו או כשהפיג׳מה שלו בכביסה", routine: "morning", ef: "flex" },
  { num: 14, text: "מבצע רק פעילויות שמקדמות את ההכנה לשינה ונמנע מעיסוק בדברים אחרים שהוא רואה או שומע ושאינם קשורים לכך. לדוגמה, מצליח להתעלם מטלוויזיה שפועלת ברקע", routine: "morning", ef: "inh" },
  { num: 15, text: "מתייחס לאיכות הביצוע של פעילויות. לדוגמה, בודק שהפיג׳מה שהוא לובש אינה הפוכה", routine: "morning", ef: "flex" },
  { num: 16, text: "נוטה לסיים פעילויות מבלי להפסיקן באמצע ולעבור לפעילויות אחרות", routine: "morning", ef: "inh" },
  // Play & Leisure (17-23)
  { num: 17, text: "מתחיל לבצע את הפעילויות ביוזמתו. לדוגמה, בוחר משחק", routine: "play", ef: "flex" },
  { num: 18, text: "מצליח לשחק בקצב מתאים (לא מהיר או איטי מדי)", routine: "play", ef: "wm" },
  { num: 19, text: "משחק לפי שלבי המשחק ובסדר המתאים", routine: "play", ef: "wm" },
  { num: 20, text: "משחק בהתאם לכללי המשחק. לדוגמה, מחכה לתורו", routine: "play", ef: "wm" },
  { num: 21, text: "בזמן שהוא משחק במשחק ספציפי הוא מבצע רק פעילויות שקשורות אליו ונמנע מלהסתובב בחדר או לגעת במשחקים אחרים", routine: "play", ef: "flex" },

  "6-7": { morning: 2.74, play: 3.42, social: 2.85, total: 3.16, inh: 2.77, wm: 3.26, flex: 3.00 },
  "8-11": { morning: 2.76, play: 3.55, social: 3.04, total: 3.28, inh: 2.84, wm: 3.37, flex: 3.07 },
};

const routineNames = { morning: "בוקר וערב", play: "פנאי ומשחק", social: "שגרה חברתית" };

// ===== BUILD QUESTIONNAIRE =====
function buildForm() {
  const container = document.getElementById("questionnaire");
  const routines = [
    { key: "morning", title: "שגרות בוקר וערב", instruction: "בהקשר לשגרת הבוקר והערב, נא ציינ/י באיזו מידה ילדך:", range: [1,16] },
    { key: "play", title: "שגרות משחק ופנאי", instruction: "בזמנים של משחק עצמאי ופנאי, נא ציינ/י באיזו מידה ילדך:", range: [17,23] },
    { key: "social", title: "שגרה חברתית", instruction: "בהקשר לתפקוד החברתי, נא ציינ/י באיזו מידה ילדך:", range: [24,30] },
  ];

  const scaleLabels = ["אף\nפעם", "לעיתים\nרחוקות", "לפעמים", "לעיתים\nקרובות", "תמיד"];

  routines.forEach(r => {
    const section = document.createElement("div");
    section.className = "routine-section";

    let html = `<div class="routine-title">${r.title}</div>`;
    html += `<div style="display:flex; align-items:center; gap:8px; margin:8px 0 4px; font-size:0.85rem; color:#666;">
      <span>מי נמצא עם הילד בדרך כלל בשגרות אלו:</span>
      <select id="companion_${r.key}" style="padding:4px 8px; border:1px solid #ddd; border-radius:6px; font-family:inherit; font-size:0.85rem;">
        <option value="">—</option>
        <option value="mom">אמא</option>
        <option value="dad">אבא</option>
        <option value="both">שני ההורים</option>
        <option value="other">אחר</option>
      </select>
    </div>`;
    html += `<div class="routine-instruction">${r.instruction}</div>`;

    items.filter(it => it.num >= r.range[0] && it.num <= r.range[1]).forEach(item => {
      html += `<div class="item-row">
        <span class="item-num">${item.num}</span>
        <span class="item-text">${item.text}</span>
        <div class="item-scores">`;
      for (let v = 1; v <= 5; v++) {
        html += `<input type="radio" name="q${item.num}" id="q${item.num}_${v}" value="${v}">`;
        html += `<label for="q${item.num}_${v}">${scaleLabels[v-1]}</label>`;
      }
      html += `</div>
        <span class="item-num">${item.num}</span>`;
      html += `</div></div>`;
    });

    section.innerHTML = html;
    container.appendChild(section);
  });
}

// Auto-calculate age from date of birth
function updateAge() {
  const birthInput = document.getElementById("birthDate").value;
  const fillInput = document.getElementById("fillDate").value;
  if (!birthInput || !fillInput) return;

  const birth = new Date(birthInput);
  const fill = new Date(fillInput);
  if (birth >= fill) return;

  // Calculate years and months
  let years = fill.getFullYear() - birth.getFullYear();
  let months = fill.getMonth() - birth.getMonth();
  if (fill.getDate() < birth.getDate()) months--;
  if (months < 0) { years--; months += 12; }

  const totalYears = years + months / 12;
  document.getElementById("calcAge").textContent = `${years} שנים, ${months} חודשים`;

  // Set age group
  const ageGroupEl = document.getElementById("ageGroup");
  const ageGroupDisplay = document.getElementById("ageGroupDisplay");
  if (totalYears >= 3 && totalYears < 6) {
    ageGroupEl.value = "3-5";
    ageGroupDisplay.textContent = "3.0 — 5.11";
  } else if (totalYears >= 6 && totalYears < 8) {
    ageGroupEl.value = "6-7";
    ageGroupDisplay.textContent = "6.0 — 7.11";
  } else if (totalYears >= 8 && totalYears < 12) {
    ageGroupEl.value = "8-11";
    ageGroupDisplay.textContent = "8.0 — 11.11";
  } else {
    ageGroupEl.value = "";
    ageGroupDisplay.textContent = "מחוץ לטווח הגילאים";
    ageGroupDisplay.style.color = "#e74c3c";
    return;
  }
  ageGroupDisplay.style.color = "#2ecc71";
}

// ===== SAVE / LOAD =====
function saveForm() {
  const data = {
    anonId: document.getElementById("anonId").value,
    gender: document.getElementById("childGender").value,
    birthDate: document.getElementById("birthDate").value,
    fillDate: document.getElementById("fillDate").value,
    companions: {
      morning: document.getElementById("companion_morning")?.value || "",
      play: document.getElementById("companion_play")?.value || "",
      social: document.getElementById("companion_social")?.value || "",
    },
    answers: {}
  };
  items.forEach(item => {
    const checked = document.querySelector(`input[name="q${item.num}"]:checked`);
    if (checked) data.answers[item.num] = parseInt(checked.value);
  });
  localStorage.setItem("eforts_save", JSON.stringify(data));
  const ind = document.getElementById("saveIndicator");
  ind.style.display = "block";
  setTimeout(() => ind.style.display = "none", 2000);
}

function loadForm() {
  const raw = localStorage.getItem("eforts_save");
  if (!raw) return;
  const data = JSON.parse(raw);
  if (data.anonId) document.getElementById("anonId").value = data.anonId;
  if (data.gender) document.getElementById("childGender").value = data.gender;
  if (data.birthDate) document.getElementById("birthDate").value = data.birthDate;
  if (data.fillDate) document.getElementById("fillDate").value = data.fillDate;
  if (data.companions) {
    ["morning", "play", "social"].forEach(k => {
      const el = document.getElementById("companion_" + k);
      if (el && data.companions[k]) el.value = data.companions[k];
    });
  }
  if (data.answers) {
    Object.entries(data.answers).forEach(([num, val]) => {
      const radio = document.getElementById(`q${num}_${val}`);
      if (radio) radio.checked = true;
    });
  }
  updateAge();
}

document.addEventListener("DOMContentLoaded", () => {
  buildForm();
  // Set default date, then try to load saved data
  document.getElementById("fillDate").valueAsDate = new Date();
  loadForm();
  document.getElementById("birthDate").addEventListener("change", updateAge);
  document.getElementById("fillDate").addEventListener("change", updateAge);
});

// ===== CALCULATE =====
function calculate() {
  const birthDate = document.getElementById("birthDate").value;
  if (!birthDate) {
    showWarning("יש להזין תאריך לידה לפני חישוב הציונים");
    return;
  }
  const ageGroup = document.getElementById("ageGroup").value;
  if (!ageGroup) {
    showWarning("הגיל מחוץ לטווח (3-11) — לא ניתן לחשב ציונים");
    return;
  }

  // Collect scores
  const scores = {};
  let missing = [];
  items.forEach(item => {
    const checked = document.querySelector(`input[name="q${item.num}"]:checked`);
    if (checked) {
      scores[item.num] = parseInt(checked.value);
    } else {
      missing.push(item.num);
    }
  });

  if (missing.length > 0) {
    showWarning(`חסרות תשובות לפריטים: ${missing.join(", ")}`);
    return;
  }

  hideWarning();

  // Routine averages
  const morningItems = items.filter(i => i.routine === "morning").map(i => scores[i.num]);
  const playItems = items.filter(i => i.routine === "play").map(i => scores[i.num]);
  const socialItems = items.filter(i => i.routine === "social").map(i => scores[i.num]);

  const morningAvg = avg(morningItems);
  const playAvg = avg(playItems);
  const socialAvg = avg(socialItems);
  const totalAvg = avg([morningAvg, playAvg, socialAvg]);

  // EF scale averages (items 10 and 11 excluded)
  const inhItems = items.filter(i => i.ef === "inh").map(i => scores[i.num]);
  const wmItems = items.filter(i => i.ef === "wm").map(i => scores[i.num]);
  const flexItems = items.filter(i => i.ef === "flex").map(i => scores[i.num]);

  const inhAvg = avg(inhItems);
  const wmAvg = avg(wmItems);
  const flexAvg = avg(flexItems);

  // Get cutoffs
  const c = cutoffs[ageGroup];

  // Build results
  const resultsDiv = document.getElementById("results");
  const ageLabel = document.getElementById("ageGroupDisplay").textContent;
  const anonId = document.getElementById("anonId").value || "—";
  const ageText = document.getElementById("calcAge").textContent;
  const gender = document.getElementById("childGender").value === "male" ? "זכר" : document.getElementById("childGender").value === "female" ? "נקבה" : "";

  // Build item detail lists
  const routineGroups = {
    morning: { label: "בוקר וערב", items: items.filter(i => i.routine === "morning") },
    play: { label: "פנאי ומשחק", items: items.filter(i => i.routine === "play") },
    social: { label: "שגרה חברתית", items: items.filter(i => i.routine === "social") },
  };
  const efGroups = {
    inh: { label: "עכבה", items: items.filter(i => i.ef === "inh") },
    wm: { label: "זיכרון עבודה", items: items.filter(i => i.ef === "wm") },
    flex: { label: "גמישות מחשבתית", items: items.filter(i => i.ef === "flex") },
  };

  resultsDiv.innerHTML = `
    <div class="results-title">תוצאות — מזהה: ${anonId} | ${gender} | ${ageText} | קבוצת גיל: ${ageLabel}</div>
    <div class="drill-hint">לחצ/י על כל תיבה כדי לראות פירוט הפריטים</div>
    <div class="results-grid">
      <div class="section-divider">ציוני שגרות</div>
      ${resultCard("morning", "בוקר וערב", morningAvg, c.morning, routineGroups.morning.items, scores, "routine")}
      ${resultCard("play", "פנאי ומשחק", playAvg, c.play, routineGroups.play.items, scores, "routine")}
      ${resultCard("social", "שגרה חברתית", socialAvg, c.social, routineGroups.social.items, scores, "routine")}
      ${resultCard("total", "ציון כולל", totalAvg, c.total, [], scores, "total")}

      <div class="section-divider">סולמות תפקודים ניהוליים</div>
      ${resultCard("inh", "עכבה", inhAvg, c.inh, efGroups.inh.items, scores, "ef")}
      ${resultCard("wm", "זיכרון עבודה", wmAvg, c.wm, efGroups.wm.items, scores, "ef")}
      ${resultCard("flex", "גמישות מחשבתית", flexAvg, c.flex, efGroups.flex.items, scores, "ef")}
    </div>
    <div style="font-size:0.75rem; color:#aaa; text-align:center; margin-top:8px;">
      ציון חתך = 1.5 סטיות תקן מתחת לממוצע הנורמטיבי. ציון מתחת לחתך מעיד על חשד לעיכוב.
      <br>פריטים 10 ו-11 לא נכללים בחישוב הסולמות הניהוליים.
    </div>

    <div class="summary-section">
      <div class="summary-title">סיכום קליני</div>
      <div class="summary-text">${buildSummary({
        anonId, gender, ageText, ageLabel,
        morningAvg, playAvg, socialAvg, totalAvg,
        inhAvg, wmAvg, flexAvg,
        c, scores
      })}</div>
    </div>

    <button class="pdf-btn" onclick="printResults()">שמור כ-PDF / הדפס</button>
    <button class="back-btn" onclick="goBack()">חזרה לשאלון — לשנות תשובות</button>
  `;

  resultsDiv.style.display = "block";
  document.getElementById("resetRow").style.display = "flex";
  resultsDiv.scrollIntoView({ behavior: "smooth", block: "start" });
}

function resultCard(id, label, score, cutoff, cardItems, scores, type) {
  const status = score >= cutoff ? "above" : "below";
  const statusText = score >= cutoff ? "בטווח התקין" : "מתחת לציון החתך";
  const isTotal = type === "total";
  const hasDetails = cardItems.length > 0;

  // Sort items by score (weakest first)
  const sorted = [...cardItems].sort((a, b) => scores[a.num] - scores[b.num]);
  const weakItems = sorted.filter(i => scores[i.num] <= 2);
  const midItems = sorted.filter(i => scores[i.num] === 3);
  const strongItems = sorted.filter(i => scores[i.num] >= 4);

  const efLabels = { inh: "עכבה", wm: "זיכרון עבודה", flex: "גמישות מחשבתית" };
  const routineLabels = { morning: "בוקר/ערב", play: "פנאי/משחק", social: "חברתית" };

  let detailsHtml = "";
  if (hasDetails) {
    detailsHtml = `<div class="drilldown" id="drill_${id}" style="display:none;">`;

    // Summary bar
    detailsHtml += `<div class="drill-summary">
      <span class="drill-badge drill-weak">${weakItems.length} חלשים</span>
      <span class="drill-badge drill-mid">${midItems.length} בינוניים</span>
      <span class="drill-badge drill-strong">${strongItems.length} חזקים</span>
    </div>`;

    // Item list sorted weakest first
    sorted.forEach(item => {
      const s = scores[item.num];
      const scoreClass = s <= 2 ? "drill-weak" : s === 3 ? "drill-mid" : "drill-strong";
      const tag = type === "routine" ? (item.ef ? efLabels[item.ef] : "—") : routineLabels[item.routine];
      const scoreDots = [1,2,3,4,5].map(v =>
        `<span class="drill-dot ${v === s ? scoreClass + '-bg' : ''}">${v}</span>`
      ).join("");

      detailsHtml += `<div class="drill-item ${scoreClass}-row">
        <span class="drill-item-num">${item.num}</span>
        <span class="drill-item-text">${item.text}</span>
        <span class="drill-item-tag">${tag}</span>
        <div class="drill-dots">${scoreDots}</div>
      </div>`;
    });

    detailsHtml += `</div>`;
  }

  // Plain-language interpretation
  const interp = score <= 2 ? "קושי משמעותי" : score <= 3 ? "מתחת לממוצע" : score <= 4 ? "בטווח הממוצע" : "חזק";

  return `<div class="result-card ${status} ${isTotal ? 'full-width' : ''} ${hasDetails ? 'clickable' : ''}" ${hasDetails ? `onclick="toggleDrill('${id}')"` : ''}>
    <div class="result-label">${label} ${hasDetails ? '<span class="drill-arrow" id="arrow_' + id + '">&#9660;</span>' : ''}</div>
    <div class="result-score has-tooltip" tabindex="0">${score.toFixed(2)}<span class="tooltip-text">ממוצע על סולם 1-5:
1.0-2.0 = קושי משמעותי
2.0-3.0 = מתחת לממוצע
3.0-4.0 = בטווח הממוצע
4.0-5.0 = חזק</span></div>
    <div class="result-interp">${interp}</div>
    <div class="result-cutoff has-tooltip" tabindex="0">ציון חתך: ${cutoff.toFixed(2)}<span class="tooltip-text">ציון חתך = 1.5 סטיות תקן מתחת לממוצע הנורמטיבי לקבוצת הגיל. ציון מתחת לחתך מעיד על חשד לעיכוב.</span></div>
    <div class="result-status">${statusText}</div>
    ${detailsHtml}
  </div>`;
}

function buildSummary(d) {
  const interpLabel = (s) => s <= 2 ? "קושי משמעותי" : s <= 3 ? "מתחת לממוצע" : s <= 4 ? "בטווח הממוצע" : "חזק";
  const belowCutoff = (s, c) => s < c;

  // Identify weak routines and EF scales
  const weakRoutines = [];
  const strongRoutines = [];
  if (belowCutoff(d.morningAvg, d.c.morning)) weakRoutines.push("בוקר וערב"); else strongRoutines.push("בוקר וערב");
  if (belowCutoff(d.playAvg, d.c.play)) weakRoutines.push("פנאי ומשחק"); else strongRoutines.push("פנאי ומשחק");
  if (belowCutoff(d.socialAvg, d.c.social)) weakRoutines.push("שגרה חברתית"); else strongRoutines.push("שגרה חברתית");

  const weakEFs = [];
  const strongEFs = [];
  if (belowCutoff(d.inhAvg, d.c.inh)) weakEFs.push("עכבה"); else strongEFs.push("עכבה");
  if (belowCutoff(d.wmAvg, d.c.wm)) weakEFs.push("זיכרון עבודה"); else strongEFs.push("זיכרון עבודה");
  if (belowCutoff(d.flexAvg, d.c.flex)) weakEFs.push("גמישות מחשבתית"); else strongEFs.push("גמישות מחשבתית");

  // Find weakest items (score 1-2)
  const weakItems = items.filter(i => d.scores[i.num] <= 2).sort((a, b) => d.scores[a.num] - d.scores[b.num]);

  let summary = "";

  // Opening
  summary += `<p><strong>נבדק/ת:</strong> מזהה ${d.anonId}`;
  if (d.gender) summary += `, ${d.gender}`;
  summary += `, ${d.ageText}, קבוצת גיל ${d.ageLabel}.</p>`;

  // Overall
  const totalStatus = belowCutoff(d.totalAvg, d.c.total);
  summary += `<p><strong>ציון כולל:</strong> ${d.totalAvg.toFixed(2)} (${interpLabel(d.totalAvg)}).`;
  if (totalStatus) {
    summary += ` <span style="color:#e74c3c;">הציון הכולל מתחת לציון החתך (${d.c.total.toFixed(2)}), המעיד על חשד לקושי בניהול עצמי של שגרות יום-יום.</span>`;
  } else {
    summary += ` הציון הכולל בטווח התקין.`;
  }
  summary += `</p>`;

  // Routines
  summary += `<p><strong>שגרות:</strong> `;
  if (weakRoutines.length === 0) {
    summary += `כל שלוש השגרות בטווח התקין.`;
  } else {
    summary += `קושי נמצא בשגרות: <span style="color:#e74c3c;">${weakRoutines.join(", ")}</span>.`;
    if (strongRoutines.length > 0) summary += ` בטווח התקין: ${strongRoutines.join(", ")}.`;
  }
  summary += `</p>`;

  // EF Scales
  summary += `<p><strong>תפקודים ניהוליים:</strong> `;
  if (weakEFs.length === 0) {
    summary += `כל שלושת הסולמות בטווח התקין.`;
  } else {
    summary += `קושי נמצא ב: <span style="color:#e74c3c;">${weakEFs.join(", ")}</span>.`;
    if (strongEFs.length > 0) summary += ` בטווח התקין: ${strongEFs.join(", ")}.`;
  }
  summary += `</p>`;

  // Weak items detail
  if (weakItems.length > 0) {
    const efLabels = { inh: "עכבה", wm: "זיכרון עבודה", flex: "גמישות מחשבתית" };
    summary += `<p><strong>פריטים שדורגו כחלשים ביותר (אף פעם / לעיתים רחוקות):</strong></p><ul>`;
    weakItems.slice(0, 8).forEach(item => {
      const label = item.ef ? efLabels[item.ef] : "";
      summary += `<li>"${item.text}" <span style="color:#999;">(פריט ${item.num}${label ? " — " + label : ""})</span></li>`;
    });
    if (weakItems.length > 8) summary += `<li>ו-${weakItems.length - 8} פריטים נוספים...</li>`;
    summary += `</ul>`;
  }

  // Strengths
  const strongItems = items.filter(i => d.scores[i.num] >= 5);
  if (strongItems.length > 0) {
    summary += `<p><strong>חוזקות (דורגו "תמיד"):</strong> ${strongItems.length} פריטים, `;
    summary += `כולל: "${strongItems[0].text}"`;
    if (strongItems.length > 1) summary += ` ו-${strongItems.length - 1} נוספים`;
    summary += `.</p>`;
  }

  return summary;
}

async function printResults() {
  const btn = document.querySelector(".pdf-btn");
  btn.disabled = true;
  btn.textContent = "...יוצר PDF";

  // Expand all drilldowns for capture
  const drilldowns = document.querySelectorAll(".drilldown");
  const origStates = [];
  drilldowns.forEach(el => { origStates.push(el.style.display); el.style.display = "block"; });

  // Hide buttons inside results
  const pdfBtnEl = document.querySelector(".pdf-btn");
  pdfBtnEl.style.display = "none";

  try {
    const resultsEl = document.getElementById("results");
    const canvas = await html2canvas(resultsEl, {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff",
      scrollY: -window.scrollY
    });

    const imgData = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 10;
    const imgW = pageW - margin * 2;
    const imgH = (canvas.height * imgW) / canvas.width;

    // Multi-page support
    let yPos = margin;
    let remainH = imgH;
    const pageContentH = pageH - margin * 2;

    if (imgH <= pageContentH) {
      pdf.addImage(imgData, "PNG", margin, margin, imgW, imgH);
    } else {
      // Split across pages
      let srcY = 0;
      while (remainH > 0) {
        const sliceH = Math.min(remainH, pageContentH);
        const sliceCanvas = document.createElement("canvas");
        sliceCanvas.width = canvas.width;
        sliceCanvas.height = (sliceH / imgH) * canvas.height;
        const ctx = sliceCanvas.getContext("2d");
        ctx.drawImage(canvas, 0, srcY, canvas.width, sliceCanvas.height, 0, 0, canvas.width, sliceCanvas.height);
        const sliceData = sliceCanvas.toDataURL("image/png");
        if (srcY > 0) pdf.addPage();
        pdf.addImage(sliceData, "PNG", margin, margin, imgW, sliceH);
        srcY += sliceCanvas.height;
        remainH -= sliceH;
      }
    }

    const anonId = document.getElementById("anonId").value || "eforts";
    pdf.save(`EFORTS_${anonId}_${new Date().toISOString().slice(0,10)}.pdf`);
  } catch(e) {
    alert("שגיאה ביצירת PDF: " + e.message);
  }

  // Restore drilldown states
  drilldowns.forEach((el, i) => el.style.display = origStates[i]);
  pdfBtnEl.style.display = "block";
  btn.disabled = false;
  btn.textContent = "שמור כ-PDF / הדפס";
}

function toggleDrill(id) {
  const el = document.getElementById("drill_" + id);
  const arrow = document.getElementById("arrow_" + id);
  if (el.style.display === "none") {
    el.style.display = "block";
    arrow.innerHTML = "&#9650;";
  } else {
    el.style.display = "none";
    arrow.innerHTML = "&#9660;";
  }
}

function avg(arr) {
  if (arr.length === 0) return 0;
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}

function showWarning(msg) {
  const w = document.getElementById("warning");
  w.textContent = msg;
  w.style.display = "block";
  w.scrollIntoView({ behavior: "smooth" });
}
function hideWarning() {
  document.getElementById("warning").style.display = "none";
}

function goBack() {
  document.getElementById("results").style.display = "none";

  document.getElementById("questionnaire").scrollIntoView({ behavior: "smooth", block: "start" });
}

function resetForm() {
  if (!confirm("לאפס את כל התשובות ולהתחיל שאלון חדש?")) return;
  localStorage.removeItem("eforts_save");
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);

  document.getElementById("childGender").value = "";

  document.getElementById("ageGroup").value = "";

  window.scrollTo({ top: 0, behavior: "smooth" });
}
